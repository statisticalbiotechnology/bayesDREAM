# GFI1B pipeline config mirroring run_gfi1b_notebook_cells.py workflow

data:
  meta: /work/GFI1B_run/meta_cis_GFI1B.csv
  counts: /work/GFI1B_run/gene_counts.csv
  counts_read_csv_kwargs: {index_col: 0}

model:
  modality_name: gene
  cis_gene: GFI1B
  output_dir: /work/output
  label: testing_20260224
  guide_covariates: [cell_line]
  device: cpu

run:
  steps: [technical, cis]

technical:
  set_technical_groups: [cell_line]
  fit:
    tolerance: 0
    niters: 50000
  save: true

cis:
  load_technical:
    enabled: true
  adjust_ntc_sum_factor:
    enabled: true
    args:
      covariates: [lane, cell_line]
  fit:
    sum_factor_col: sum_factor_adj
    tolerance: 0
    niters: 100000
    predictive_on_cpu: true
  save: true
