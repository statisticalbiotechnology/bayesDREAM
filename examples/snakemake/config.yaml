# Snakemake driver config for bayesDREAM CLI stages (technical + cis).

# Absolute or relative path to repository root.
project_dir: .

# bayesDREAM Typer CLI YAML config to execute.
bayesdream_config: examples/gfi1b_cli_config_smk.yaml

execution:
  # One of: auto, container, local
  # auto: use container if apptainer is available, else local python.
  mode: auto

  # If in container mode, prefer GPU image:
  # - CUDA image + --nv when NVIDIA is detected
  # - ROCm image + --rocm when AMD is detected
  prefer_gpu: true

  # Container references (local .sif path or oras:// ref)
  image_cpu: oras://ghcr.io/statisticalbiotechnology/bayesdream-apptainer:cpu-amd64-latest
  image_gpu: oras://ghcr.io/statisticalbiotechnology/bayesdream-apptainer:cuda-amd64-latest
  image_rocm: oras://ghcr.io/statisticalbiotechnology/bayesdream-apptainer:rocm-amd64-latest

  # Python command for local mode.
  local_python: python
